name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore SageTUI.slnx

      - name: Build
        run: dotnet build SageTUI.slnx --no-restore

      - name: Test
        run: dotnet run --project SageTUI.Tests/SageTUI.Tests.fsproj --no-build -- --summary-location

      - name: Verify README test count matches actual
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Extract actual test count from the test binary (runs fast, just lists tests)
          ACTUAL=$(dotnet run --project SageTUI.Tests/SageTUI.Tests.fsproj --no-build -- --list-tests 2>/dev/null | wc -l)
          # Extract the count from the README h1 line: "N,NNN tests"
          README=$(grep -oP '\d[\d,]*(?= tests)' README.md | head -1 | tr -d ',')
          echo "Actual test count: $ACTUAL"
          echo "README test count: $README"
          if [ "$ACTUAL" != "$README" ]; then
            echo "ERROR: README says '$README' tests but found '$ACTUAL'. Update the count in README.md."
            exit 1
          fi

      - name: Verify tutorial examples compile
        if: matrix.os == 'ubuntu-latest'
        run: dotnet fsi docs/tutorial-verify.fsx

      - name: Pack
        run: dotnet pack SageTUI.Library.fsproj --no-build -o ./artifacts

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-${{ matrix.os }}
          path: ./artifacts/*.nupkg

  # ── Benchmark regression gate ──────────────────────────────────────────────
  # Guards the SIMD diffing moat. Runs only on ubuntu to keep results stable.
  #
  # Security model (split-job pattern):
  #   benchmark-regression: read-only comparison, runs on push AND PR.
  #     - No write permissions. Uploads benchmark JSON as an artifact.
  #   benchmark-push-baseline: write permissions, runs ONLY on master push.
  #     - Downloads JSON from benchmark-regression artifact, pushes to gh-pages.
  #
  # Why 150% threshold? That's 1.5x regression — meaningful but not noisy on a
  # shared CI runner. Baselines are generated with 15 iterations + 5 warmups so
  # variance is low enough that 150% stays quiet on clean code.
  benchmark-regression:
    runs-on: ubuntu-latest
    needs: [build-and-test]
    permissions: {}  # explicitly read-only; write access lives only in benchmark-push-baseline

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore SageTUI.slnx

      - name: Build (Release)
        run: dotnet build SageTUI.slnx --no-restore -c Release

      - name: Run benchmarks
        run: >
          dotnet run -c Release --project SageTUI.Benchmarks --no-build --
          --exporters json
          --artifacts ./bench-out
          --filter '*'
          --iterationCount 15
          --warmupCount 5
        timeout-minutes: 20

      - name: Verify benchmark output exists
        run: |
          if [ ! -f "./bench-out/results/SageTUI.Benchmarks-report-full-compressed.json" ]; then
            echo "ERROR: Benchmark JSON not found at expected path."
            echo "Files found:"
            find ./bench-out -name "*.json" | head -20
            exit 1
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: ./bench-out/results/SageTUI.Benchmarks-report-full-compressed.json
          if-no-files-found: error

      # Read-only comparison against stored gh-pages baseline.
      # Does NOT push — that is the job of benchmark-push-baseline below.
      - name: Compare benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'benchmarkdotnet'
          output-file-path: ./bench-out/results/SageTUI.Benchmarks-report-full-compressed.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Alert when any benchmark is 1.5x slower than baseline (meaningful regression)
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: true
          # Never push from this job — baseline updates are done in benchmark-push-baseline
          auto-push: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

  # Pushes the new baseline to gh-pages only on master push (never on PRs).
  # Separated from benchmark-regression to limit write permissions to master only.
  benchmark-push-baseline:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    needs: [benchmark-regression]
    permissions:
      contents: write
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Download benchmark results
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: ./bench-out/results/

      - name: Push baseline to gh-pages
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'benchmarkdotnet'
          output-file-path: ./bench-out/results/SageTUI.Benchmarks-report-full-compressed.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: '150%'
          comment-on-alert: false
          fail-on-alert: false
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: benchmarks

