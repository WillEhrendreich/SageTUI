name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore SageTUI.slnx

      - name: Build
        run: dotnet build SageTUI.slnx --no-restore

      - name: Test
        run: dotnet run --project SageTUI.Tests/SageTUI.Tests.fsproj --no-build -- --summary-location

      - name: Pack
        run: dotnet pack SageTUI.Library.fsproj --no-build -o ./artifacts

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-${{ matrix.os }}
          path: ./artifacts/*.nupkg
